<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PortfolioPro</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>Login to your PortfolioPro account</p>

        <form>

            <input
                type="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </div>

</div>

</body>
</html>
